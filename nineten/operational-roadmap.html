<html lang="en">
<head>

    <style>
@font-face { font-family: 'TT Hoves Pro'; src: url('../assets/fonts/TT_Hoves_Pro_Light.woff2') format('woff2'); font-weight: 300; font-style: normal; font-display: swap; }
@font-face { font-family: 'TT Hoves Pro'; src: url('../assets/fonts/TT_Hoves_Pro_Regular.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: swap; }
@font-face { font-family: 'TT Hoves Pro'; src: url('../assets/fonts/TT_Hoves_Pro_Bold.woff2') format('woff2'); font-weight: 700; font-style: normal; font-display: swap; }

:root {
  --text: #0a0a0a;
  --lime: #DAF11B;
  --pine: #006458;
  --dark-green: #001412;
  --grey: #7A7A7A;
  --grey-bg: #f5f5f5;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'TT Hoves Pro', system-ui, -apple-system, sans-serif;
  line-height: 1.6;
  color: var(--text);
  background: #fafafa;
}

.header {
  background: linear-gradient(135deg, var(--dark-green) 0%, var(--pine) 100%);
  color: white;
  padding: 60px 40px;
}

.header-inner { max-width: 800px; }

.header-tag { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.header-tag .bar { width: 32px; height: 4px; border-radius: 2px; background: var(--lime); }
.header-tag span { color: var(--lime); font-size: 11px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; }

h1 { font-size: 2.5em; font-weight: 300; margin-bottom: 12px; letter-spacing: -0.02em; }

.subtitle { font-size: 1.05em; opacity: 0.85; max-width: 700px; line-height: 1.7; }

.layout {
  display: grid;
  grid-template-columns: 240px 1fr;
  max-width: 1200px;
  margin: 0 auto;
  gap: 0;
}

/* TOC */
.toc {
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  padding: 2rem 1.5rem;
  border-right: 1px solid #e8e8e8;
  background: #fff;
}

.toc-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--grey);
  margin-bottom: 1rem;
  padding-bottom: 0.75rem;
  border-bottom: 1px solid #e8e8e8;
}

.toc-link {
  display: block;
  padding: 6px 0;
  font-size: 13px;
  color: var(--grey);
  text-decoration: none;
  transition: color 0.2s;
  line-height: 1.4;
}

.toc-link:hover, .toc-link.active {
  color: var(--pine);
}

.toc-link.active {
  font-weight: 700;
}

/* Content */
.content {
  padding: 0 3rem 4rem;
  max-width: 800px;
}

.section {
  border-bottom: 1px solid #e8e8e8;
}

.section-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  background: none;
  border: none;
  cursor: pointer;
  padding: 1.5rem 0 1rem;
  text-align: left;
  font-family: inherit;
}

.section-toggle h2 {
  font-size: 1.6em;
  font-weight: 400;
  color: var(--text);
  margin: 0;
  border: none;
  padding: 0;
}

.chevron {
  transition: transform 0.3s ease;
  color: var(--grey);
  flex-shrink: 0;
  margin-left: 1rem;
}

.section-toggle[aria-expanded="false"] .chevron {
  transform: rotate(-90deg);
}

.section-body {
  overflow: hidden;
  transition: max-height 0.4s ease, opacity 0.3s ease;
  padding-bottom: 1.5rem;
}

.section-body.collapsed {
  max-height: 0 !important;
  opacity: 0;
  padding-bottom: 0;
}

h3 {
  color: var(--text);
  font-size: 1.15em;
  font-weight: 700;
  margin: 24px 0 10px;
}

p { margin-bottom: 14px; }
ul, ol { margin: 0 0 14px 28px; }
li { margin-bottom: 6px; }

.highlight {
  background: linear-gradient(to bottom, transparent 50%, rgba(218, 241, 27, 0.35) 50%);
  padding: 0 2px;
}

.callout-lime {
  background: var(--lime);
  color: var(--text);
  padding: 20px 24px;
  margin: 24px 0;
  border-radius: 8px;
}

.callout-lime p:last-child { margin-bottom: 0; }

.callout-maji {
  background: var(--pine);
  color: white;
  padding: 20px 24px;
  margin: 24px 0;
  border-radius: 8px;
}

.callout-maji p:last-child { margin-bottom: 0; }
.callout-maji strong { color: var(--lime); }

.callout-grey {
  background: var(--grey-bg);
  border-left: 4px solid var(--lime);
  padding: 20px 24px;
  margin: 24px 0;
  border-radius: 0 8px 8px 0;
}

.callout-grey p:last-child { margin-bottom: 0; }

table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  margin: 20px 0;
  border-radius: 8px;
  overflow: hidden;
  font-size: 0.9em;
}

th, td { padding: 12px 14px; }
th { background: var(--pine); color: white; text-align: left; font-weight: 700; }
td { border-bottom: 1px solid #e8e8e8; }
tr:last-child td { border-bottom: none; }

.phase-tag {
  display: inline-block;
  padding: 3px 12px;
  border-radius: 4px;
  font-size: 0.75em;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
  color: white;
}

.phase-tag.knowledge { background: #006458; }
.phase-tag.measurement { background: #004d44; }
.phase-tag.analysis { background: #003830; }
.phase-tag.tool { background: #002820; }

.timeline-bar {
  display: flex;
  margin: 20px 0;
  border-radius: 8px;
  overflow: hidden;
  height: 40px;
  font-size: 0.75em;
  font-weight: 700;
}

.timeline-bar div {
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  padding: 0 8px;
  white-space: nowrap;
}

.tl-1 { background: #006458; flex: 3; }
.tl-2 { background: #004d44; flex: 4; }
.tl-3 { background: #003830; flex: 3; }
.tl-4 { background: #002820; flex: 4; }

.meta { font-size: 0.85em; color: var(--grey); margin-top: 4px; }

.footer {
  background: linear-gradient(135deg, var(--dark-green) 0%, var(--pine) 100%);
  color: white;
  padding: 24px 40px;
  text-align: center;
}

.footer .brand { color: var(--lime); font-weight: 700; }

/* Mobile */
@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
  .toc {
    position: relative;
    height: auto;
    border-right: none;
    border-bottom: 1px solid #e8e8e8;
    padding: 1.5rem;
  }
  .content { padding: 0 1.5rem 3rem; }
  h1 { font-size: 1.8em; }
  .header { padding: 40px 24px; }
  .charts-grid { grid-template-columns: 1fr; }
  .kpi-row { gap: .5rem; }
  .kpi { min-width: calc(50% - .5rem); }
}

/* Charts */
.kpi-row { display: flex; gap: 1rem; margin: 24px 0; flex-wrap: wrap; }
.kpi { flex: 1; min-width: 120px; background: var(--grey-bg); border: 1px solid #e8e8e8; border-radius: 8px; padding: 1rem; text-align: center; }
.kpi-value { font-size: 1.6rem; font-weight: 700; color: var(--pine); }
.kpi-label { font-size: 0.75rem; color: var(--grey); margin-top: 2px; }
.kpi-delta { font-size: 0.72rem; margin-top: 4px; font-weight: 700; }
.kpi-delta.up { color: #22c55e; }
.kpi-delta.down { color: #ef4444; }

.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 24px; }
.chart-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 8px; padding: 1.25rem; }
.chart-card.full-width { grid-column: 1 / -1; }
.chart-card h3 { font-size: 0.95em; font-weight: 700; color: var(--text); margin: 0 0 2px; }
.chart-subtitle { font-size: 0.78rem; color: var(--grey); margin-bottom: 0.75rem; }
.chart-wrap { position: relative; width: 100%; }
.chart-wrap.tall { height: 340px; }
.chart-wrap.med { height: 280px; }
.insight-box { margin-top: 0.6rem; padding: 0.5rem 0.7rem; background: #ecfdf5; border-left: 3px solid var(--pine); border-radius: 0 6px 6px 0; font-size: 0.78rem; color: var(--text); }
.insight-box.warning { background: #fef3c7; border-left-color: #f59e0b; }
.insight-box.danger { background: #fef2f2; border-left-color: #ef4444; }

#already-found .section-body { max-width: none; }
    </style>

            var PALETTE = [PINE, COLORS.rose, COLORS.emerald, COLORS.amber, COLORS.violet, COLORS.cyan, COLORS.orange, COLORS.indigo, COLORS.teal, COLORS.pink];

            Chart.defaults.font.family = "'TT Hoves Pro', system-ui, sans-serif";
            Chart.defaults.font.size = 11;
            Chart.defaults.color = '#7A7A7A';
            Chart.defaults.plugins.legend.labels.usePointStyle = true;
            Chart.defaults.plugins.legend.labels.pointStyle = 'circle';

            function fmt(v) { return '\u00A3' + (v/1000).toFixed(0) + 'k'; }
            function fmtM(v) { return '\u00A3' + (v/1000000).toFixed(2) + 'm'; }

            // 1. Total Revenue
            new Chart(document.getElementById('ch_total_rev'), {
                type:'bar', data:{ labels:DATA.total_revenue.years, datasets:[{ label:'Total Revenue', data:DATA.total_revenue.values, backgroundColor:PINE+'cc', borderColor:PINE, borderWidth:1, borderRadius:4 }] },
                options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false}, tooltip:{callbacks:{label:function(ctx){return fmtM(ctx.raw)}}} }, scales:{ y:{ticks:{callback:function(v){return fmtM(v)}},grid:{color:'#f1f5f9'}}, x:{grid:{display:false}} } }
            });

            // 2. Revenue by Process
            new Chart(document.getElementById('ch_rev_process'), {
                type:'bar', data:{ labels:DATA.revenue_by_process.years, datasets:[ {label:'Cold Formed',data:DATA.revenue_by_process.cold,backgroundColor:COLORS.blue+'cc',borderColor:COLORS.blue,borderWidth:1,borderRadius:4}, {label:'Hot Forged',data:DATA.revenue_by_process.hot,backgroundColor:COLORS.orange+'cc',borderColor:COLORS.orange,borderWidth:1,borderRadius:4} ] },
                options:{ responsive:true, maintainAspectRatio:false, plugins:{tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+': '+fmt(ctx.raw)}}}}, scales:{ x:{stacked:true,grid:{display:false}}, y:{stacked:true,ticks:{callback:function(v){return fmtM(v)}},grid:{color:'#f1f5f9'}} } }
            });

            // 3. Hot Forge Price vs Volume
            new Chart(document.getElementById('ch_hot_trend'), {
                type:'line', data:{ labels:DATA.hot_forge_trend.years, datasets:[ {label:'Price per Unit (\u00A3)',data:DATA.hot_forge_trend.price_per_unit,borderColor:COLORS.emerald,backgroundColor:COLORS.emerald+'22',fill:true,tension:0.3,yAxisID:'y',pointRadius:4,pointBackgroundColor:COLORS.emerald}, {label:'Units (thousands)',data:DATA.hot_forge_trend.units_k,borderColor:COLORS.rose,backgroundColor:COLORS.rose+'22',fill:true,tension:0.3,yAxisID:'y1',pointRadius:4,pointBackgroundColor:COLORS.rose} ] },
                options:{ responsive:true, maintainAspectRatio:false, plugins:{tooltip:{mode:'index',intersect:false}}, scales:{ y:{position:'left',title:{display:true,text:'\u00A3 per unit'},grid:{color:'#f1f5f9'}}, y1:{position:'right',title:{display:true,text:'Units (000s)'},grid:{drawOnChartArea:false}}, x:{grid:{display:false}} } }
            });

            // 4. Top Customers
            var custNames = Object.keys(DATA.top_customers.series);
            var shortNames = {'WILLIAM COOK DEFENCE LIMITED':'William Cook','ROTABOLT LIMITED':'Rotabolt','ALMEN SPEC FASTENERS':'Almen Spec','KOMATSU KVX LLC':'Komatsu KVX','DEEPAK FAST SHANNON':'Deepak Fast'};
            new Chart(document.getElementById('ch_top_custs'), {
                type:'line', data:{ labels:DATA.top_customers.years, datasets:custNames.map(function(name,i){ return {label:shortNames[name]||name,data:DATA.top_customers.series[name],borderColor:PALETTE[i],backgroundColor:PALETTE[i]+'11',tension:0.3,pointRadius:3,pointBackgroundColor:PALETTE[i],borderWidth:2}; }) },
                options:{ responsive:true, maintainAspectRatio:false, plugins:{tooltip:{mode:'index',intersect:false,callbacks:{label:function(ctx){return ctx.dataset.label+': '+fmt(ctx.raw)}}}}, scales:{ y:{ticks:{callback:function(v){return fmt(v)}},grid:{color:'#f1f5f9'}}, x:{grid:{display:false}} } }
            });

            // 5. Sector Pie
            new Chart(document.getElementById('ch_sector_pie'), {
                type:'doughnut', data:{ labels:DATA.sector_pie.labels, datasets:[{data:DATA.sector_pie.values,backgroundColor:PALETTE,borderWidth:2,borderColor:'#fff'}] },
                options:{ responsive:true, maintainAspectRatio:false, plugins:{ tooltip:{callbacks:{label:function(ctx){return ctx.label+': '+fmt(ctx.raw)}}}, legend:{position:'right'} } }
            });

            // 6. Sector Trend
            var sectorOrder = ['DIST','DEF','OIL','VEHICLES','OEM','RAIL','RENEW'];
            new Chart(document.getElementById('ch_sector_trend'), {
                type:'line', data:{ labels:DATA.sectors.years, datasets:sectorOrder.map(function(s,i){ return {label:s,data:DATA.sectors.series[s],backgroundColor:PALETTE[i]+'55',borderColor:PALETTE[i],fill:true,tension:0.3,pointRadius:0,borderWidth:1.5}; }) },
                options:{ responsive:true, maintainAspectRatio:false, plugins:{ tooltip:{mode:'index',intersect:false,callbacks:{label:function(ctx){return ctx.dataset.label+': '+fmt(ctx.raw)}}}, legend:{position:'top'} }, scales:{ x:{grid:{display:false}}, y:{stacked:true,ticks:{callback:function(v){return fmtM(v)}},grid:{color:'#f1f5f9'}} } }
            });

            // 7. Concentration
            new Chart(document.getElementById('ch_concentration'), {
                type:'doughnut', data:{ labels:DATA.concentration.labels, datasets:[{data:DATA.concentration.values,backgroundColor:['#001412',PINE,'#004d44',COLORS.violet,COLORS.slate],borderWidth:2,borderColor:'#fff'}] },
                options:{ responsive:true, maintainAspectRatio:false, plugins:{ tooltip:{callbacks:{label:function(ctx){return ctx.label+': '+ctx.raw+'%'}}}, legend:{position:'right'} } }
            });

            // 8. Customer Health
            new Chart(document.getElementById('ch_cust_health'), {
                type:'bar', data:{ labels:DATA.customer_health.years, datasets:[ {label:'Active Customers',data:DATA.customer_health.active,backgroundColor:PINE+'aa',borderColor:PINE,borderWidth:1,borderRadius:4,yAxisID:'y'}, {label:'New Customers',data:DATA.customer_health.new,type:'line',borderColor:COLORS.amber,backgroundColor:COLORS.amber+'22',fill:true,tension:0.3,pointRadius:4,pointBackgroundColor:COLORS.amber,yAxisID:'y1'} ] },
                options:{ responsive:true, maintainAspectRatio:false, plugins:{tooltip:{mode:'index',intersect:false}}, scales:{ y:{position:'left',title:{display:true,text:'Active'},grid:{color:'#f1f5f9'}}, y1:{position:'right',title:{display:true,text:'New'},grid:{drawOnChartArea:false}}, x:{grid:{display:false}} } }
            });

            // 9. Cold Formed Pricing
            var coldFamilies = Object.keys(DATA.cold_pricing.series);
            new Chart(document.getElementById('ch_cold_price'), {
                type:'line', data:{ labels:DATA.cold_pricing.years, datasets:coldFamilies.map(function(f,i){ return {label:f,data:DATA.cold_pricing.series[f],borderColor:PALETTE[i],tension:0.3,pointRadius:3,pointBackgroundColor:PALETTE[i],borderWidth:2}; }) },
                options:{ responsive:true, maintainAspectRatio:false, plugins:{tooltip:{mode:'index',intersect:false,callbacks:{label:function(ctx){return ctx.dataset.label+': \u00A3'+ctx.raw+'/100'}}}}, scales:{ y:{title:{display:true,text:'\u00A3 per 100 units'},grid:{color:'#f1f5f9'}}, x:{grid:{display:false}} } }
            });

            // 10. Cold Volume Mix
            new Chart(document.getElementById('ch_cold_vol'), {
                type:'doughnut', data:{ labels:DATA.cold_volume_share.labels, datasets:[{data:DATA.cold_volume_share.values,backgroundColor:PALETTE,borderWidth:2,borderColor:'#fff'}] },
                options:{ responsive:true, maintainAspectRatio:false, plugins:{ tooltip:{callbacks:{label:function(ctx){return ctx.label}}}, legend:{position:'right'} } }
            });

            // 11. Geography
            new Chart(document.getElementById('ch_geo'), {
                type:'bar', data:{ labels:DATA.geography.labels, datasets:[{data:DATA.geography.values,backgroundColor:PALETTE.map(function(c){return c+'cc'}),borderColor:PALETTE,borderWidth:1,borderRadius:4}] },
                options:{ responsive:true, maintainAspectRatio:false, indexAxis:'y', plugins:{ legend:{display:false}, tooltip:{callbacks:{label:function(ctx){return fmt(ctx.raw)}}} }, scales:{ x:{ticks:{callback:function(v){return fmt(v)}},grid:{color:'#f1f5f9'}}, y:{grid:{display:false}} } }
            });
        }

        // Check if already authenticated
        if (sessionStorage.getItem(SESSION_KEY) === HASH) {
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initPage);
            } else {
                initPage();
            }
        } else {
            // Poll for auth gate clearance
            var poll = setInterval(function() {
                if (sessionStorage.getItem(SESSION_KEY) === HASH) {
                    clearInterval(poll);
                    initPage();
                }
            }, 200);
        }
    })();
    </script>
</body>
</html>
