<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operational Roadmap — maji by majaco</title>

    <style>
@font-face { font-family: 'TT Hoves Pro'; src: url('../assets/fonts/TT_Hoves_Pro_Light.woff2') format('woff2'); font-weight: 300; font-style: normal; font-display: swap; }
@font-face { font-family: 'TT Hoves Pro'; src: url('../assets/fonts/TT_Hoves_Pro_Regular.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: swap; }
@font-face { font-family: 'TT Hoves Pro'; src: url('../assets/fonts/TT_Hoves_Pro_Bold.woff2') format('woff2'); font-weight: 700; font-style: normal; font-display: swap; }

:root {
  --text: #0a0a0a;
  --lime: #DAF11B;
  --pine: #006458;
  --dark-green: #001412;
  --grey: #7A7A7A;
  --grey-bg: #f5f5f5;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'TT Hoves Pro', system-ui, -apple-system, sans-serif;
  line-height: 1.6;
  color: var(--text);
  background: #fafafa;
}

.header {
  background: linear-gradient(135deg, var(--dark-green) 0%, var(--pine) 100%);
  color: white;
  padding: 60px 40px;
}

.header-inner { max-width: 800px; }

.header-tag { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.header-tag .bar { width: 32px; height: 4px; border-radius: 2px; background: var(--lime); }
.header-tag span { color: var(--lime); font-size: 11px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; }

h1 { font-size: 2.5em; font-weight: 300; margin-bottom: 12px; letter-spacing: -0.02em; }

.subtitle { font-size: 1.05em; opacity: 0.85; max-width: 700px; line-height: 1.7; }

.layout {
  display: grid;
  grid-template-columns: 240px 1fr;
  max-width: 1200px;
  margin: 0 auto;
  gap: 0;
}

/* TOC */
.toc {
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  padding: 2rem 1.5rem;
  border-right: 1px solid #e8e8e8;
  background: #fff;
}

.toc-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--grey);
  margin-bottom: 1rem;
  padding-bottom: 0.75rem;
  border-bottom: 1px solid #e8e8e8;
}

.toc-link {
  display: block;
  padding: 6px 0;
  font-size: 13px;
  color: var(--grey);
  text-decoration: none;
  transition: color 0.2s;
  line-height: 1.4;
}

.toc-link:hover, .toc-link.active {
  color: var(--pine);
}

.toc-link.active {
  font-weight: 700;
}

/* Content */
.content {
  padding: 0 3rem 4rem;
  max-width: 800px;
}

.section {
  border-bottom: 1px solid #e8e8e8;
}

.section-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  background: none;
  border: none;
  cursor: pointer;
  padding: 1.5rem 0 1rem;
  text-align: left;
  font-family: inherit;
}

.section-toggle h2 {
  font-size: 1.6em;
  font-weight: 400;
  color: var(--text);
  margin: 0;
  border: none;
  padding: 0;
}

.chevron {
  transition: transform 0.3s ease;
  color: var(--grey);
  flex-shrink: 0;
  margin-left: 1rem;
}

.section-toggle[aria-expanded="false"] .chevron {
  transform: rotate(-90deg);
}

.section-body {
  overflow: hidden;
  transition: max-height 0.4s ease, opacity 0.3s ease;
  padding-bottom: 1.5rem;
}

.section-body.collapsed {
  max-height: 0 !important;
  opacity: 0;
  padding-bottom: 0;
}

h3 {
  color: var(--text);
  font-size: 1.15em;
  font-weight: 700;
  margin: 24px 0 10px;
}

p { margin-bottom: 14px; }
ul, ol { margin: 0 0 14px 28px; }
li { margin-bottom: 6px; }

.highlight {
  background: linear-gradient(to bottom, transparent 50%, rgba(218, 241, 27, 0.35) 50%);
  padding: 0 2px;
}

.callout-lime {
  background: var(--lime);
  color: var(--text);
  padding: 20px 24px;
  margin: 24px 0;
  border-radius: 8px;
}

.callout-lime p:last-child { margin-bottom: 0; }

.callout-maji {
  background: var(--pine);
  color: white;
  padding: 20px 24px;
  margin: 24px 0;
  border-radius: 8px;
}

.callout-maji p:last-child { margin-bottom: 0; }
.callout-maji strong { color: var(--lime); }

.callout-grey {
  background: var(--grey-bg);
  border-left: 4px solid var(--lime);
  padding: 20px 24px;
  margin: 24px 0;
  border-radius: 0 8px 8px 0;
}

.callout-grey p:last-child { margin-bottom: 0; }

table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  margin: 20px 0;
  border-radius: 8px;
  overflow: hidden;
  font-size: 0.9em;
}

th, td { padding: 12px 14px; }
th { background: var(--pine); color: white; text-align: left; font-weight: 700; }
td { border-bottom: 1px solid #e8e8e8; }
tr:last-child td { border-bottom: none; }

.phase-tag {
  display: inline-block;
  padding: 3px 12px;
  border-radius: 4px;
  font-size: 0.75em;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
  color: white;
}

.phase-tag.knowledge { background: #006458; }
.phase-tag.measurement { background: #004d44; }
.phase-tag.analysis { background: #003830; }
.phase-tag.tool { background: #002820; }

.timeline-bar {
  display: flex;
  margin: 20px 0;
  border-radius: 8px;
  overflow: hidden;
  height: 40px;
  font-size: 0.75em;
  font-weight: 700;
}

.timeline-bar div {
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  padding: 0 8px;
  white-space: nowrap;
}

.tl-1 { background: #006458; flex: 3; }
.tl-2 { background: #004d44; flex: 4; }
.tl-3 { background: #003830; flex: 3; }
.tl-4 { background: #002820; flex: 4; }

.meta { font-size: 0.85em; color: var(--grey); margin-top: 4px; }

.footer {
  background: linear-gradient(135deg, var(--dark-green) 0%, var(--pine) 100%);
  color: white;
  padding: 24px 40px;
  text-align: center;
}

.footer .brand { color: var(--lime); font-weight: 700; }

/* Mobile */
@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
  .toc {
    position: relative;
    height: auto;
    border-right: none;
    border-bottom: 1px solid #e8e8e8;
    padding: 1.5rem;
  }
  .content { padding: 0 1.5rem 3rem; }
  h1 { font-size: 1.8em; }
  .header { padding: 40px 24px; }
}

        function initPage() {
            // Decode and inject content
            var decoded = atob(ENCODED);
            document.getElementById('app').innerHTML = decoded;

            // Section toggle functionality
            var toggles = document.querySelectorAll('.section-toggle');
            toggles.forEach(function(toggle) {
                toggle.addEventListener('click', function() {
                    var expanded = this.getAttribute('aria-expanded') === 'true';
                    var body = this.nextElementSibling;
                    if (expanded) {
                        this.setAttribute('aria-expanded', 'false');
                        body.classList.add('collapsed');
                    } else {
                        this.setAttribute('aria-expanded', 'true');
                        body.classList.remove('collapsed');
                    }
                });
            });

            // TOC scroll highlighting with IntersectionObserver
            var sections = document.querySelectorAll('.section[id]');
            var tocLinks = document.querySelectorAll('.toc-link');

            if (sections.length && tocLinks.length) {
                var observer = new IntersectionObserver(function(entries) {
                    entries.forEach(function(entry) {
                        if (entry.isIntersecting) {
                            var id = entry.target.getAttribute('id');
                            tocLinks.forEach(function(link) {
                                link.classList.remove('active');
                                if (link.getAttribute('href') === '#' + id) {
                                    link.classList.add('active');
                                }
                            });
                        }
                    });
                }, {
                    rootMargin: '-10% 0px -80% 0px',
                    threshold: 0
                });

                sections.forEach(function(section) {
                    observer.observe(section);
                });
            }

            // Smooth scroll on TOC link clicks
            tocLinks.forEach(function(link) {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    var targetId = this.getAttribute('href').substring(1);
                    var target = document.getElementById(targetId);
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                });
            });
        }

        // Check if already authenticated
        if (sessionStorage.getItem(SESSION_KEY) === HASH) {
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initPage);
            } else {
                initPage();
            }
        } else {
            // Poll for auth gate clearance
            var poll = setInterval(function() {
                if (sessionStorage.getItem(SESSION_KEY) === HASH) {
                    clearInterval(poll);
                    initPage();
                }
            }, 200);
        }
    })();
    </script>
